# Copy to .streamlit/secrets.toml for local dev; paste into Streamlit Cloud "Secrets".
APP_PASSWORD   = "change-me"
SHEET_ID       = "your-google-sheet-id"          # from the Sheet URL (.../d/<ID>/edit)
GOOGLE_SA_JSON = "{...service-account-json-on-one-line...}"   # whole JSON key, read-only access to the Sheet
