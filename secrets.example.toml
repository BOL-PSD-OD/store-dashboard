# Copy to .streamlit/secrets.toml for local dev; paste into Streamlit Cloud "Secrets".
APP_PASSWORD   = "change-me"
SHEET_ID       = "your-google-sheet-id"          # from the Sheet URL (.../d/<ID>/edit)

# Auth to read the Sheet. Prefer USER OAUTH (the user owns the Sheet; the service
# account was deleted / has no quota). Use the same 3 values as the kobo_sync repo.
GOOGLE_OAUTH_CLIENT_ID     = "...apps.googleusercontent.com"
GOOGLE_OAUTH_CLIENT_SECRET = "..."
GOOGLE_OAUTH_REFRESH_TOKEN = "..."

# Fallback only (used if the OAuth keys above are absent):
# GOOGLE_SA_JSON = "{...service-account-json-on-one-line...}"
